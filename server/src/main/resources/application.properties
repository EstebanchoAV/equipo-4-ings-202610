spring.application.name=antojosupb

# Configuración de Conexión a Base de Datos 
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=AntojosUPBdb;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
